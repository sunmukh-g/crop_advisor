<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kisan AI Chatbot 🌾</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <style>
        /* 🎨 Premium Color Palette */
        :root {
            --primary-gradient: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
            --user-msg-bg: #e8f5e9;
            --bot-msg-bg: #ffffff;
            --bg-body: #f4f7f6;
            --text-main: #2d3748;
            --text-light: #718096;
        }

        body {
            font-family: 'Poppins', sans-serif; /* Upgraded Font */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-body);
            background-image: url('https://images.unsplash.com/photo-1592982537447-6f23349666bf?q=80&w=2000&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
        }

        /* Soft dark overlay for background contrast */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(6px);
            z-index: 1;
        }

        /* 📱 Floating App Container */
        .chat-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            height: 85vh;
            max-height: 750px;
            background: #fafafa;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 20px;
        }

        /* 🏷️ Premium Header */
        .chat-header {
            background: var(--primary-gradient);
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .status-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background-color: #4ade80;
            border: 2px solid white;
            border-radius: 50%;
        }

        .header-info h3 { margin: 0; font-size: 18px; font-weight: 600; }
        .header-info p { margin: 0; font-size: 13px; color: #bbf7d0; margin-top: 3px; font-weight: 300;}

        /* 💬 Chat Box */
        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            background-color: #f8fafc;
        }

        #chat-box::-webkit-scrollbar { width: 5px; } 
        #chat-box::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .message {
            max-width: 75%;
            padding: 14px 18px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
            animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Stylized Bubbles */
        .user {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            color: var(--text-main);
            border-radius: 20px 20px 4px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            font-weight: 500;
        }

        .bot {
            align-self: flex-start;
            background-color: var(--bot-msg-bg);
            color: var(--text-main);
            border: 1px solid #e2e8f0;
            border-radius: 20px 20px 20px 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
        }

        .bot p { margin: 0 0 10px 0; }
        .bot p:last-child { margin: 0; }
        .bot strong { color: #166534; }

        /* 💡 Sleek Suggestion Chips */
        .suggestions {
            display: flex;
            gap: 10px;
            padding: 12px 20px;
            overflow-x: auto;
            background: white;
            border-top: 1px solid #f1f5f9;
        }

        .suggestions::-webkit-scrollbar { display: none; }

        .chip {
            background: white;
            border: 1.5px solid #dcfce7;
            color: #16a34a;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .chip:hover {
            background: #16a34a;
            color: white;
            border-color: #16a34a;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(22, 163, 74, 0.2);
        }

        /* ✍️ Premium Input Area */
        .input-area {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: white;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.02);
            gap: 12px;
        }

        input {
            flex: 1;
            padding: 15px 20px;
            background: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 30px;
            outline: none;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            color: var(--text-main);
            transition: all 0.3s ease;
        }
        
        input::placeholder { color: #94a3b8; }
        
        input:focus {
            background: white;
            border: 2px solid #4ade80;
            box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.15);
        }

        /* Icon Button */
        button {
            background: var(--primary-gradient);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.3);
        }

        button:hover { 
            transform: scale(1.08) rotate(5deg); 
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.4);
        }
        
        button:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }

        button svg {
            width: 20px;
            height: 20px;
            fill: white;
            margin-left: 2px;
        }

        /* Typing Dots */
        .typing-indicator { display: flex; gap: 5px; padding: 15px 20px; align-items: center; }
        .typing-indicator span { width: 7px; height: 7px; background-color: #94a3b8; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>

<body>

<div class="overlay"></div>

<div class="chat-container">
    <div class="chat-header">
        <div class="avatar">
            🌾
            <div class="status-dot"></div>
        </div>
        <div class="header-info">
            <h3>Kisan AI Advisor</h3>
            <p>Online & ready to help</p>
        </div>
    </div>

    <div id="chat-box">
        <div class="message bot">नमस्ते किसान साथी! मैं आपका स्मार्ट कृषि सहायक हूँ। आज मैं आपकी क्या मदद कर सकता हूँ?</div>
    </div>

    <div class="suggestions">
        <div class="chip" onclick="fillInput('What is the weather today?')">🌦️ Weather</div>
        <div class="chip" onclick="fillInput('Latest Mandi prices for Wheat')">📈 Mandi Prices</div>
        <div class="chip" onclick="fillInput('How to treat yellow leaves in tomatoes?')">🍂 Crop Diseases</div>
    </div>

    <div class="input-area">
        <input type="text" id="message-input" placeholder="Type your question...">
        <button id="send-btn" aria-label="Send message">
            <svg viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
            </svg>
        </button>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const inputField = document.getElementById("message-input");
        const sendBtn = document.getElementById("send-btn");
        const chatBox = document.getElementById("chat-box");

        window.fillInput = function(text) {
            inputField.value = text;
            inputField.focus();
        };

        sendBtn.addEventListener("click", sendMessage);
        inputField.addEventListener("keypress", (event) => {
            if (event.key === "Enter") sendMessage();
        });

        async function sendMessage() {
            const message = inputField.value.trim();
            if (!message) return;

            inputField.value = "";
            inputField.disabled = true;
            sendBtn.disabled = true;

            appendMessage(message, "user");

            const typingId = "typing-" + Date.now();
            const typingHtml = `<div class="message bot typing-indicator" id="${typingId}"><span></span><span></span><span></span></div>`;
            chatBox.insertAdjacentHTML('beforeend', typingHtml);
            scrollToBottom();

            try {
                const response = await fetch("/chatbot/api/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: message })
                });

                if (!response.ok) throw new Error("Network error");
                const data = await response.json();
                
                document.getElementById(typingId).remove();
                
                const rawHtml = marked.parse(data.reply);
                const safeHtml = DOMPurify.sanitize(rawHtml);
                
                appendMessage(safeHtml, "bot", true);

            } catch (error) {
                document.getElementById(typingId)?.remove();
                appendMessage("⚠️ Connection error. Please try again.", "bot");
            } finally {
                inputField.disabled = false;
                sendBtn.disabled = false;
                inputField.focus();
            }
        }

        function appendMessage(textOrHtml, sender, isHtml = false) {
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${sender}`;
            if (isHtml) msgDiv.innerHTML = textOrHtml;
            else msgDiv.textContent = textOrHtml;
            chatBox.appendChild(msgDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    });
</script>

</body>
</html>
