{% extends 'core/base.html' %}
{% load static %}
{% block title %}Sign Out — Kisan AI{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card-header">
      <div class="auth-logo">👋</div>
      <h2>Sign Out</h2>
      <p>See you next time, {{ user.username }}!</p>
    </div>
    <div class="logout-card-body">
      <div class="logout-icon">🌾</div>
      <p class="logout-text">Are you sure you want to log out of Kisan AI?</p>
      <form method="POST">
        {% csrf_token %}
        <div class="logout-btns">
          <a href="{% url 'home' %}" class="btn-cancel">
            <i class="fas fa-arrow-left"></i> Stay
          </a>
          <button type="submit" class="btn-logout">
            <i class="fas fa-sign-out-alt"></i> Yes, Log Out
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock content %}
